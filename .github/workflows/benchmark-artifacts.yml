name: Verify published benchmark artifacts

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/benchmark-artifacts.yml"
      - "benchmarks/published/**"
      - "BENCHMARKS.md"
      - "README.md"
      - "pareto_plot.png"
      - "docs/pareto.html"
      - "model_metadata.json"
      - "src/batch_doc_vqa/benchmarks/**"
      - "src/batch_doc_vqa/update_benchmarks.py"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches: [main]
    paths:
      - ".github/workflows/benchmark-artifacts.yml"
      - "benchmarks/published/**"
      - "BENCHMARKS.md"
      - "README.md"
      - "pareto_plot.png"
      - "docs/pareto.html"
      - "model_metadata.json"
      - "src/batch_doc_vqa/benchmarks/**"
      - "src/batch_doc_vqa/update_benchmarks.py"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "latest"
      - run: uv sync --locked
      - run: uv run python -m unittest discover -s tests
      - run: uv run update-benchmarks --source published --no-interactive --check

name: Verify published benchmark artifacts

on:
  pull_request:
    paths:
      - "benchmarks/published/**"
      - "BENCHMARKS.md"
      - "README.md"
      - "pareto_plot.png"
      - "docs/pareto.html"
      - "model_metadata.json"
      - "src/batch_doc_vqa/benchmarks/**"
      - "src/batch_doc_vqa/update_benchmarks.py"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches: [main]
    paths:
      - "benchmarks/published/**"
      - "BENCHMARKS.md"
      - "README.md"
      - "pareto_plot.png"
      - "docs/pareto.html"
      - "model_metadata.json"
      - "src/batch_doc_vqa/benchmarks/**"
      - "src/batch_doc_vqa/update_benchmarks.py"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          version: "latest"
      - run: uv sync --locked
      - run: uv run python -m unittest discover -s tests
      - run: uv run update-benchmarks --source published --no-interactive --check
